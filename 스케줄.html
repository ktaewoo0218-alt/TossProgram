<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>회의 일정 조율 프로토타입</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 기본 폰트 설정 (Apple SD Gothic Neo 등) */
    body { font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    /* 애니메이션 설정 */
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulseSlow { 0%,100% { box-shadow: 0 0 0 0 rgba(30,41,59,0.25);} 50% { box-shadow: 0 0 0 10px rgba(30,41,59,0);} }
    .animate-pop { animation: pop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
    .animate-pulse-slow { animation: pulseSlow 2.2s ease-in-out infinite; }
    .screen-enter { animation: fadeSlide 0.35s ease-out; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const WARM_WHITE = "#FDFBF7";

    const INITIAL_PARTICIPANTS = [
      { id: 1, name: "김민준", role: "주최자", required: true },
      { id: 2, name: "이서연", role: "", required: true },
      { id: 3, name: "박지호", role: "", required: true },
      { id: 4, name: "최유나", role: "", required: false },
      { id: 5, name: "정우진", role: "", required: false },
      { id: 6, name: "한소희", role: "", required: false },
    ];

    const DUMMY_CANDIDATES = [
      { id: "A", date: "7/20 (월)", time: "10:00 ~ 11:00", statuses: ["c", "c", "v", "c", "c", null] },
      { id: "B", date: "7/20 (월)", time: "14:00 ~ 15:00", statuses: ["c", "v", "c", "c", "v", "c"] },
      { id: "C", date: "7/21 (화)", time: "10:30 ~ 11:30", statuses: ["c", "c", "c", "v", null, "v"] },
      { id: "D", date: "7/21 (화)", time: "15:00 ~ 16:00", statuses: ["v", "c", "c", "c", "c", "c"] },
      { id: "E", date: "7/22 (수)", time: "11:00 ~ 12:00", statuses: ["c", null, "c", "c", "c", "v"] },
    ];

    function scoreCandidate(candidate, participants) {
      let total = 0;
      let requiredConfirmedScore = 0;
      let requiredConfirmedCount = 0;
      let requiredVariable = [];
      let missing = [];
      candidate.statuses.forEach((s, i) => {
        const p = participants[i];
        if (s === "c") {
          total += p.required ? 10 : 3;
          if (p.required) {
            requiredConfirmedScore += 10;
            requiredConfirmedCount += 1;
          }
        } else if (s === "v") {
          total += p.required ? 4 : 1;
          if (p.required) requiredVariable.push(p.name);
        } else {
          missing.push(p.name);
        }
      });
      const allConfirmed = candidate.statuses.every((s) => s === "c");
      const allAvailable = candidate.statuses.every((s) => s !== null);
      return { ...candidate, total, requiredConfirmedScore, requiredConfirmedCount, requiredVariable, missing, allConfirmed, allAvailable };
    }

    const SLOT_H = 44;
    const START_HOUR = 9;
    const SLOT_COUNT = 18;

    const slotLabel = (idx) => {
      const h = START_HOUR + Math.floor(idx / 2);
      const m = idx % 2 === 0 ? "00" : "30";
      return `${String(h).padStart(2, "0")}:${m}`;
    };

    const Badge = ({ required }) =>
      required ? (
        <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-800 text-white">필수</span>
      ) : (
        <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-sky-100 text-sky-700">선택</span>
      );

    const Card = ({ children, className = "" }) => (
      <div className={`rounded-2xl shadow-sm border border-slate-100 ${className}`} style={{ backgroundColor: WARM_WHITE }}>
        {children}
      </div>
    );

    const PrimaryBtn = ({ children, onClick, disabled, className = "" }) => (
      <button
        onClick={onClick}
        disabled={disabled}
        className={`w-full py-4 rounded-xl font-semibold text-white bg-slate-800 shadow-sm transition-all duration-200 hover:bg-slate-700 active:scale-[0.98] disabled:bg-slate-300 disabled:cursor-not-allowed ${className}`}
      >
        {children}
      </button>
    );

    const StepHeader = ({ eyebrow, title, subtitle }) => (
      <div className="space-y-2 mb-6">
        <p className="text-xs font-semibold tracking-widest text-sky-600 uppercase">{eyebrow}</p>
        <h2 className="text-2xl font-bold text-slate-800 leading-snug">{title}</h2>
        {subtitle && <p className="text-sm text-slate-500 leading-relaxed">{subtitle}</p>}
      </div>
    );

    function MeetingScheduler() {
      const [step, setStep] = useState(0);
      const [meetingName, setMeetingName] = useState("7월 신제품 킥오프");
      const [participants, setParticipants] = useState(INITIAL_PARTICIPANTS);
      const [copied, setCopied] = useState(false);
      const [myName, setMyName] = useState("");
      const [selectedDays, setSelectedDays] = useState([20, 21, 22]);
      const [activeDateIdx, setActiveDateIdx] = useState(0);
      const [blocks, setBlocks] = useState({});
      const [saving, setSaving] = useState(false);
      const [doneCount, setDoneCount] = useState(4);
      const [finalPick, setFinalPick] = useState(null);
      const [confirmed, setConfirmed] = useState(false);

      const scored = useMemo(() => {
        const list = DUMMY_CANDIDATES.map((c) => scoreCandidate(c, participants));
        return list.sort((a, b) => b.total - a.total);
      }, [participants]);

      const perfectSlot = scored.find((c) => c.allConfirmed);
      const primaryRec = [...scored].sort(
        (a, b) => b.requiredConfirmedScore - a.requiredConfirmedScore || b.total - a.total
      )[0];
      const secondaryRec = scored.find((c) => c.id !== primaryRec.id && c.allAvailable) || scored[1];

      useEffect(() => {
        if (step !== 7) return;
        setDoneCount(4);
        const t1 = setTimeout(() => setDoneCount(5), 1400);
        const t2 = setTimeout(() => setDoneCount(6), 3000);
        return () => {
          clearTimeout(t1);
          clearTimeout(t2);
        };
      }, [step]);

      const goNext = () => setStep((s) => Math.min(9, s + 1));
      const goPrev = () => setStep((s) => Math.max(0, s - 1));

      const toggleRequired = (id) =>
        setParticipants((ps) => ps.map((p) => (p.id === id ? { ...p, required: !p.required } : p)));

      const toggleDay = (d) =>
        setSelectedDays((days) => (days.includes(d) ? days.filter((x) => x !== d) : [...days, d].sort((a, b) => a - b)));

      const copyLink = () => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      };

      const handleSlotTap = (idx) => {
        const day = selectedDays[activeDateIdx];
        if (day == null) return;
        setBlocks((prev) => {
          const dayBlocks = { ...(prev[day] || {}) };
          const covering = dayBlocks[idx] != null ? idx : dayBlocks[idx - 1] != null ? idx - 1 : null;
          if (covering != null) {
            if (dayBlocks[covering] === "confirmed") dayBlocks[covering] = "variable";
            else delete dayBlocks[covering];
          } else {
            const start = Math.min(idx, SLOT_COUNT - 2);
            const hasOverlap = dayBlocks[start] != null || dayBlocks[start - 1] != null || dayBlocks[start + 1] != null;
            if (!hasOverlap) dayBlocks[start] = "confirmed";
          }
          return { ...prev, [day]: dayBlocks };
        });
      };

      const myBlockCount = Object.values(blocks).reduce((n, d) => n + Object.keys(d).length, 0);

      const renderStep = () => {
        switch (step) {
          case 0:
            return (
              <div className="flex flex-col items-center justify-center min-h-full text-center px-6 py-16 space-y-8">
                <div className="w-20 h-20 rounded-2xl bg-slate-800 flex items-center justify-center shadow-sm">
                  <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round">
                    <rect x="3" y="5" width="18" height="16" rx="3" />
                    <path d="M3 10h18M8 3v4M16 3v4" />
                    <circle cx="12" cy="15.5" r="2.4" fill="#BAE6FD" stroke="none" />
                  </svg>
                </div>
                <div className="space-y-3">
                  <h1 className="text-3xl font-bold text-slate-800 tracking-tight">여섯이 모이는 시간</h1>
                  <p className="text-slate-500 leading-relaxed text-sm">
                    6명의 일정을 겹쳐 보고,<br />가장 가능성 높은 회의 시간을 찾아드려요.
                  </p>
                </div>
                <button onClick={goNext} className="mt-4 px-10 py-4 rounded-2xl bg-slate-800 text-white font-semibold shadow-sm transition-all duration-300 hover:bg-slate-700 hover:shadow-md active:scale-95 animate-pulse-slow">
                  터치하여 시작
                </button>
                <p className="text-xs text-slate-400">로그인 없이 링크 하나로 시작</p>
              </div>
            );
          case 1:
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 2 · 주최자" title="회의를 설정해 주세요" subtitle="참석자별 중요도를 지정하면 추천 정확도가 올라가요." />
                <Card className="p-6 space-y-4">
                  <label className="block space-y-2">
                    <span className="text-sm font-semibold text-slate-800">회의 이름</span>
                    <input value={meetingName} onChange={(e) => setMeetingName(e.target.value)} placeholder="예: 7월 신제품 킥오프" className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300 transition-all duration-200" />
                  </label>
                  <div className="flex items-center justify-between pt-1">
                    <span className="text-sm font-semibold text-slate-800">참석 인원</span>
                    <span className="text-sm font-bold text-slate-800 bg-sky-100 text-sky-700 px-3 py-1 rounded-full">6인</span>
                  </div>
                </Card>
                <Card className="p-6 space-y-1">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-sm font-semibold text-slate-800">참석자 중요도</span>
                    <span className="text-xs text-slate-400">탭하여 필수 ↔ 선택 전환</span>
                  </div>
                  <div className="space-y-2">
                    {participants.map((p) => (
                      <button key={p.id} onClick={() => toggleRequired(p.id)} className="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white border border-slate-100 transition-all duration-200 hover:border-sky-200 active:scale-[0.99]">
                        <span className="flex items-center gap-2">
                          <span className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-600">{p.name[0]}</span>
                          <span className="text-sm font-medium text-slate-800">{p.name}</span>
                          {p.role && <span className="text-xs text-slate-400">{p.role}</span>}
                        </span>
                        <Badge required={p.required} />
                      </button>
                    ))}
                  </div>
                </Card>
                <PrimaryBtn onClick={goNext}>초대 링크 만들기</PrimaryBtn>
              </div>
            );
          case 2:
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 3 · 공유" title="초대 링크가 준비됐어요" subtitle="6명에게 링크를 보내면 각자 가능한 시간을 입력해요." />
                <Card className="p-6 space-y-5 text-center">
                  <div className="w-14 h-14 mx-auto rounded-2xl bg-sky-100 flex items-center justify-center">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369A1" strokeWidth="2" strokeLinecap="round">
                      <path d="M10 14a5 5 0 007.5.5l2-2a5 5 0 00-7-7l-1 1" />
                      <path d="M14 10a5 5 0 00-7.5-.5l-2 2a5 5 0 007 7l1-1" />
                    </svg>
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-slate-800">{meetingName || "이름 없는 회의"}</p>
                    <p className="text-xs text-slate-400 mt-1">참석 6인 · 필수 {participants.filter((p) => p.required).length}명</p>
                  </div>
                  <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-4 py-3">
                    <span className="flex-1 text-left text-sm text-slate-500 truncate">when6.app/m/kx92-vd7a</span>
                    <button onClick={copyLink} className={`text-xs font-semibold px-3 py-1.5 rounded-lg transition-all duration-200 ${copied ? "bg-sky-100 text-sky-700" : "bg-slate-800 text-white hover:bg-slate-700"}`}>
                      {copied ? "복사됨!" : "복사"}
                    </button>
                  </div>
                </Card>
                <PrimaryBtn onClick={goNext}>참여자 화면 미리보기 →</PrimaryBtn>
              </div>
            );
          case 3:
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 4 · 참여자" title={`「${meetingName || "회의"}」에 초대됐어요`} subtitle="이름을 입력하고 본인의 참석 중요도를 확인해 주세요." />
                <Card className="p-6 space-y-5">
                  <label className="block space-y-2">
                    <span className="text-sm font-semibold text-slate-800">이름</span>
                    <input value={myName} onChange={(e) => setMyName(e.target.value)} placeholder="이름을 입력해 주세요" className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300 transition-all duration-200" />
                  </label>
                  <div className={`rounded-xl px-4 py-4 flex items-center justify-between transition-all duration-300 ${myName.trim() ? "bg-slate-800" : "bg-slate-100"}`}>
                    <div>
                      <p className={`text-xs ${myName.trim() ? "text-sky-200" : "text-slate-400"}`}>주최자가 지정한 나의 중요도</p>
                      <p className={`text-sm font-bold mt-0.5 ${myName.trim() ? "text-white" : "text-slate-400"}`}>{myName.trim() ? "필수 참석자" : "이름 입력 후 확인돼요"}</p>
                    </div>
                    {myName.trim() && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-sky-100 text-sky-700">필수</span>}
                  </div>
                </Card>
                <PrimaryBtn onClick={goNext} disabled={!myName.trim()}>가능한 날짜 고르러 가기</PrimaryBtn>
              </div>
            );
          case 4: {
            const firstDow = 3; 
            const daysInMonth = 31;
            const cells = [...Array(firstDow).fill(null), ...Array.from({ length: daysInMonth }, (_, i) => i + 1)];
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 5 · 날짜" title="가능한 날짜를 모두 골라주세요" subtitle="여러 날짜를 선택할수록 시간이 잡힐 확률이 높아져요." />
                <Card className="p-6">
                  <p className="text-center text-sm font-bold text-slate-800 mb-4">2026년 7월</p>
                  <div className="grid grid-cols-7 gap-1 text-center mb-2">
                    {["일", "월", "화", "수", "목", "금", "토"].map((d, i) => (
                      <span key={d} className={`text-xs font-semibold py-1 ${i === 0 ? "text-rose-400" : i === 6 ? "text-sky-500" : "text-slate-400"}`}>{d}</span>
                    ))}
                  </div>
                  <div className="grid grid-cols-7 gap-1">
                    {cells.map((d, i) => d === null ? <span key={`e${i}`} /> : (
                      <button key={d} onClick={() => d >= 13 && toggleDay(d)} disabled={d < 13} className={`aspect-square rounded-xl text-sm font-medium transition-all duration-200 ${selectedDays.includes(d) ? "bg-slate-800 text-white shadow-sm scale-105" : d < 13 ? "text-slate-300 cursor-not-allowed" : "text-slate-700 hover:bg-sky-100 hover:text-sky-700"}`}>
                        {d}
                      </button>
                    ))}
                  </div>
                </Card>
                <PrimaryBtn onClick={() => { setActiveDateIdx(0); goNext(); }} disabled={selectedDays.length === 0}>{selectedDays.length}개 날짜로 시간 고르기</PrimaryBtn>
              </div>
            );
          }
          case 5: {
            const day = selectedDays[activeDateIdx];
            const dayBlocks = (day != null && blocks[day]) || {};
            return (
              <div className="flex flex-col h-[600px]">
                <div className="p-6 pb-3">
                  <StepHeader eyebrow="Step 6 · 시간" title="가능한 시간을 터치하세요" subtitle="한 번 터치 → 1시간 확정 블록 · 다시 터치 → 변수 시간 · 한 번 더 → 삭제" />
                  <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
                    {selectedDays.map((d, i) => (
                      <button key={d} onClick={() => setActiveDateIdx(i)} className={`flex-shrink-0 px-4 py-2.5 rounded-xl text-center transition-all duration-200 ${i === activeDateIdx ? "bg-slate-800 text-white shadow-sm" : "bg-white text-slate-500 border border-slate-100"}`}>
                        <span className="block text-[10px] opacity-70">7월</span>
                        <span className="block text-sm font-bold leading-tight">{d}일</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto px-6 pb-6">
                  <Card className="p-4 relative">
                    <div className="relative" style={{ height: SLOT_COUNT * SLOT_H }}>
                      {Array.from({ length: SLOT_COUNT }, (_, i) => (
                        <div key={i} onClick={() => handleSlotTap(i)} className="absolute left-0 right-0 cursor-pointer group" style={{ top: i * SLOT_H, height: SLOT_H }}>
                          <div className={`absolute left-12 right-0 top-0 ${i % 2 === 0 ? "border-t border-slate-200" : "border-t border-dashed border-slate-100"}`} />
                          {i % 2 === 0 && <span className="absolute left-0 -top-2 text-[11px] text-slate-400 font-medium w-10 text-right pr-1">{slotLabel(i)}</span>}
                          <div className="absolute left-12 right-0 top-0 bottom-0 rounded-lg transition-colors duration-150 group-hover:bg-sky-50" />
                        </div>
                      ))}
                      {Object.entries(dayBlocks).map(([startStr, status]) => {
                        const start = Number(startStr);
                        const isConfirmed = status === "confirmed";
                        return (
                          <button key={start} onClick={(e) => { e.stopPropagation(); handleSlotTap(start); }} className={`absolute left-12 right-1 rounded-xl px-3 py-2 text-left shadow-sm transition-all duration-300 active:scale-[0.98] ${isConfirmed ? "bg-slate-800 text-white" : "bg-sky-100 text-sky-700 border border-sky-200"}`} style={{ top: start * SLOT_H + 2, height: SLOT_H * 2 - 4 }}>
                            <span className="block text-xs font-bold">{slotLabel(start)} ~ {slotLabel(start + 2)}</span>
                            <span className={`block text-[11px] mt-0.5 ${isConfirmed ? "text-sky-200" : "text-sky-600"}`}>{isConfirmed ? "확정 시간" : "변수 시간"}</span>
                          </button>
                        );
                      })}
                    </div>
                  </Card>
                  <div className="mt-4">
                    <PrimaryBtn onClick={goNext} disabled={myBlockCount === 0}>{myBlockCount > 0 ? `${myBlockCount}개 시간 입력 완료` : "시간을 1개 이상 선택하세요"}</PrimaryBtn>
                  </div>
                </div>
              </div>
            );
          }
          case 6:
            return (
              <div className="flex flex-col items-center justify-center h-[500px] p-6 text-center space-y-6">
                {!saving ? (
                  <>
                    <div className="w-16 h-16 rounded-2xl bg-sky-100 flex items-center justify-center">
                      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#0369A1" strokeWidth="2.2" strokeLinecap="round">
                        <path d="M5 13l4 4L19 7" />
                      </svg>
                    </div>
                    <div className="space-y-2">
                      <h2 className="text-2xl font-bold text-slate-800">입력 내용을 확인했어요</h2>
                      <p className="text-sm text-slate-500 leading-relaxed">제출하면 다른 참여자의 현황을 볼 수 있어요.</p>
                    </div>
                    <div className="w-full max-w-xs">
                      <PrimaryBtn onClick={() => { setSaving(true); setTimeout(() => { setSaving(false); setStep(7); }, 1400); }}>일정 제출하기</PrimaryBtn>
                    </div>
                  </>
                ) : (
                  <p className="text-sm font-medium text-slate-600">일정을 저장하고 있어요…</p>
                )}
              </div>
            );
          case 7: {
            const pct = Math.round((doneCount / 6) * 100);
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 8 · 현황" title="참여 현황" subtitle="전원이 입력을 마치면 추천 결과가 열려요." />
                <Card className="p-6 space-y-4">
                  <div className="flex items-end justify-between">
                    <span className="text-sm font-semibold text-slate-800">입력 완료율</span>
                    <span className="text-3xl font-bold text-slate-800 tabular-nums">{pct}%</span>
                  </div>
                  <div className="h-3 rounded-full bg-slate-100 overflow-hidden">
                    <div className="h-full rounded-full bg-slate-800 transition-all duration-700 ease-out" style={{ width: `${pct}%` }} />
                  </div>
                </Card>
                <Card className="p-6">
                  <p className="text-sm font-semibold text-slate-800 mb-3">참여자별 상태</p>
                  <div className="space-y-2">
                    {participants.map((p, i) => {
                      const done = i < doneCount;
                      return (
                        <div key={p.id} className="flex items-center justify-between px-4 py-3 rounded-xl bg-white border border-slate-100">
                          <span className="text-sm font-medium text-slate-800">{p.name}</span>
                          <span className={`text-xs font-semibold ${done ? "text-sky-600" : "text-slate-300"}`}>{done ? "완료" : "대기 중"}</span>
                        </div>
                      );
                    })}
                  </div>
                </Card>
                <PrimaryBtn onClick={goNext} disabled={doneCount < 6}>{doneCount < 6 ? "전원 완료 대기 중…" : "추천 결과 보기"}</PrimaryBtn>
              </div>
            );
          }
          case 8:
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 9 · 추천" title="분석이 끝났어요" subtitle="가장 적합한 시간을 추천해 드려요." />
                <Card className="p-6 space-y-3 border-2 border-slate-800">
                  <span className="text-xs font-bold px-2.5 py-1 rounded-full bg-slate-800 text-white">1순위 추천</span>
                  <p className="text-xl font-bold text-slate-800">{primaryRec.date} · {primaryRec.time}</p>
                </Card>
                <Card className="p-6 space-y-3">
                  <span className="text-xs font-bold px-2.5 py-1 rounded-full bg-sky-100 text-sky-700">2순위 · 조율안</span>
                  <p className="text-xl font-bold text-slate-800">{secondaryRec.date} · {secondaryRec.time}</p>
                </Card>
                <PrimaryBtn onClick={goNext}>최종 확정하러 가기</PrimaryBtn>
              </div>
            );
          case 9:
            return (
              <div className="p-6 space-y-4">
                <StepHeader eyebrow="Step 10 · 확정" title="최종 확정 완료" subtitle="모든 팀원에게 알림이 전송되었습니다." />
                <button onClick={() => setStep(0)} className="w-full py-4 mt-10 rounded-xl font-semibold bg-sky-100 text-sky-700">처음부터 다시 테스트하기</button>
              </div>
            );
          default: return null;
        }
      };

      const STEP_TITLES = ["메인", "회의 설정", "링크 공유", "참여자 진입", "날짜 선택", "타임라인", "입력 완료", "대시보드", "추천 결과", "최종 확정"];

      return (
        <div className="w-full max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 relative pb-24">
          <div className="screen-enter flex-1">{renderStep()}</div>
          <div className="fixed bottom-0 left-0 right-0 flex justify-center bg-white/80 backdrop-blur-md border-t border-slate-100 p-4">
            <div className="w-full max-w-md flex items-center justify-between">
              <button onClick={goPrev} disabled={step === 0} className="px-4 py-2 text-sm font-semibold bg-slate-100 text-slate-600 rounded-lg disabled:opacity-50">← 이전</button>
              <span className="text-xs font-bold text-slate-500">{step + 1} / 10</span>
              <button onClick={goNext} disabled={step === 9} className="px-4 py-2 text-sm font-semibold bg-slate-800 text-white rounded-lg disabled:opacity-50">다음 →</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MeetingScheduler />);
  </script>
</body>
</html>
